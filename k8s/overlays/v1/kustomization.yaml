apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
nameSuffix: -v1
namespace: app-v1
resources:
  - ../../base/component-a.yaml
  - ../../base/component-b.yaml
images:
  - name: ghcr.io/example/component-a
    newTag: v1.0.0
  - name: ghcr.io/example/component-b
    newTag: v1.0.0
patches:
  - target:
      kind: Deployment
      name: component-b
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: http://component-a-v1:8080
