apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: component-b-version-v2
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-by-header: "X-App-Version"
    nginx.ingress.kubernetes.io/canary-by-header-value: "2"
spec:
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: component-b-v2
                port:
                  number: 8081
