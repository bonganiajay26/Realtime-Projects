apiVersion: apps/v1
kind: Deployment
metadata:
  name: component-a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: component-a
  template:
    metadata:
      labels:
        app: component-a
    spec:
      containers:
        - name: component-a
          image: ghcr.io/example/component-a:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: component-a
spec:
  selector:
    app: component-a
  ports:
    - port: 8080
      targetPort: 8080
