apiVersion: apps/v1
kind: Deployment
metadata:
  name: component-b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: component-b
  template:
    metadata:
      labels:
        app: component-b
    spec:
      containers:
        - name: component-b
          image: ghcr.io/example/component-b:latest
          env:
            - name: COMPONENT_A_BASE_URL
              value: http://component-a:8080
          ports:
            - containerPort: 8081
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: component-b
spec:
  selector:
    app: component-b
  ports:
    - port: 8081
      targetPort: 8081
